    <main class="main-content">
      <header class="topbar">
        <div>
          <span class="page-tag" id="modoFormulario">Formulario</span>
          <h1 id="tituloFormulario">Nuevo estudiante</h1>
          <p>Completa los datos del estudiante</p>
        </div>


      </header>

      <section class="form-page-panel">
        <div id="mensajeFormulario" class="info-box">Completa la información.</div>
        <div id="toast" class="toast hidden"></div>

        <form id="formEstudiante" class="form-grid-page">
          <input type="hidden" id="mongoId" />

          <div class="form-group">
            <label for="IdEstudiante">ID Estudiante</label>
            <input type="number" id="IdEstudiante" required />
          </div>

          <div class="form-group">
            <label for="Nombre">Nombre</label>
            <input type="text" id="Nombre" required />
          </div>

          <div class="form-group">
            <label for="FechaNacimiento">Fecha de nacimiento</label>
            <input type="date" id="FechaNacimiento" required />
          </div>

          <div class="form-group">
            <label for="Genero">Género</label>
            <select id="Genero" required>
              <option value="">Seleccione</option>
              <option value="M">M</option>
              <option value="F">F</option>
            </select>
          </div>

          <div class="form-group">
            <label for="IdGrupo">ID Grupo</label>
            <input type="number" id="IdGrupo" />
          </div>

          <div class="form-group">
            <label for="Estado">Estado</label>
            <select id="Estado" required>
              <option value="Activo">Activo</option>
              <option value="Inactivo">Inactivo</option>
            </select>
          </div>

          <div class="form-actions-page">
            <a href="estudiantes.html" class="btn btn-light">Volver</a>
            <button type="submit" class="btn btn-primary">
              <i class="fa-solid fa-floppy-disk"></i> Guardar
            </button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="js/estudiante-form.js"></script>
  <div id="toast" class="toast hidden"></div>
</body>

</html>
